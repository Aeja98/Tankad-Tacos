<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrera | Tankad Tacos</title>
  <script type="module" src="/src/js/register.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">Tankad Tacos</a>

      <nav>
        <a href="index.html">Start</a>
        <a href="register.html">Registrera</a>
        <a href="login.html">Logga in</a>
        <a href="dashboard.html">Admin</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="card">
      <h1>Registrera personal</h1>
      <p>Skapa ett konto för att kunna logga in i adminpanelen.</p>

      <form id="registerForm">
        <div>
          <label for="username">Användarnamn</label>
          <input type="text" id="username" name="username" required>
        </div>

        <div>
          <label for="email">E-post</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div>
          <label for="password">Lösenord</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Skapa konto</button>
      </form>

      <p id="message" class="message"></p>

      <p>
        Har du redan ett konto?
        <a href="login.html">Logga in här</a>.
      </p>
    </section>
  </main>
</body>
</html>
